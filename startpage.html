<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>—</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0c0c0d;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Georgia', serif;
      padding: 3rem 2rem;
      position: relative;
      overflow: hidden;
    }

    .noise {
      position: fixed;
      inset: 0;
      background-image: radial-gradient(ellipse at 50% 0%, #1a1820 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .wrap {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 600px;
    }

    .clock {
      font-family: 'SF Mono', 'Fira Mono', 'Courier New', monospace;
      font-size: clamp(56px, 12vw, 88px);
      font-weight: 200;
      letter-spacing: -3px;
      color: #e8e4dc;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      text-align: center;
    }

    .dateline {
      font-family: 'SF Mono', 'Fira Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.22em;
      color: #3d3d40;
      text-transform: uppercase;
      margin-top: 10px;
      text-align: center;
    }

    .quote-block {
      margin-top: 64px;
      text-align: center;
      width: 100%;
    }

    .quote-mark {
      font-size: 64px;
      line-height: 0.6;
      color: #2a2730;
      display: block;
      margin-bottom: 8px;
      user-select: none;
    }

    .quote-text {
      font-size: 17px;
      line-height: 1.8;
      color: #b0ab9f;
      font-style: italic;
      min-height: 56px;
      transition: opacity 0.45s ease;
    }

    .quote-author {
      font-family: 'SF Mono', 'Fira Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.18em;
      color: #3d3a4a;
      text-transform: uppercase;
      margin-top: 20px;
      transition: opacity 0.45s ease;
    }

    .quote-text.fade,
    .quote-author.fade { opacity: 0; }

    .refresh-btn {
      margin-top: 40px;
      background: none;
      border: 1px solid #222226;
      color: #3a3840;
      font-family: 'SF Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      padding: 8px 22px;
      border-radius: 3px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    .refresh-btn:hover { border-color: #3a3840; color: #7a7480; }
    .refresh-btn:disabled { opacity: 0.3; cursor: default; }
  </style>
</head>
<body>
  <div class="noise"></div>

  <div class="wrap">
    <div class="clock" id="clock">00:00</div>
    <div class="dateline" id="dateline">—</div>

    <div class="quote-block">
      <span class="quote-mark">"</span>
      <div class="quote-text" id="qt">...</div>
      <div class="quote-author" id="qa">&nbsp;</div>
      <button class="refresh-btn" id="rbtn" onclick="loadQuote()">↻ &nbsp;новая цитата</button>
    </div>
  </div>

  <script>
    function updateClock() {
      const now = new Date();
      const h = String(now.getHours()).padStart(2, '0');
      const m = String(now.getMinutes()).padStart(2, '0');
      document.getElementById('clock').textContent = h + ':' + m;

      const days = ['воскресенье','понедельник','вторник','среда','четверг','пятница','суббота'];
      const months = ['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
      const day = days[now.getDay()];
      const d = now.getDate();
      const mo = months[now.getMonth()];
      document.getElementById('dateline').textContent = day + ' · ' + d + ' ' + mo;
    }
    updateClock();
    setInterval(updateClock, 10000);

    async function loadQuote() {
      const btn = document.getElementById('rbtn');
      const qt = document.getElementById('qt');
      const qa = document.getElementById('qa');

      btn.disabled = true;
      qt.classList.add('fade');
      qa.classList.add('fade');

      await new Promise(r => setTimeout(r, 400));

      const lang = Math.random() < 0.5 ? 'ru' : 'en';
      const prompt = lang === 'ru'
        ? 'Дай одну короткую философскую цитату о смысле жизни, существовании или человеческой природе. Только сама цитата в кавычках, затем на новой строке — имя автора с тире. Без пояснений. Язык: русский.'
        : 'Give one short philosophical quote about the meaning of life, existence, or human nature. Just the quote in quotation marks, then on a new line the author name with an em dash. No explanations. Language: English.';

      try {
        const resp = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            model: 'claude-sonnet-4-20250514',
            max_tokens: 200,
            messages: [{ role: 'user', content: prompt }]
          })
        });
        const data = await resp.json();
        const raw = data.content.map(b => b.text || '').join('').trim();
        const lines = raw.split('\n').map(l => l.trim()).filter(Boolean);
        let text = lines[0] || raw;
        let author = lines[1] || '';
        text = text.replace(/^["«"']|["»"']$/g, '').trim();
        author = author.replace(/^[—–-]\s*/, '').trim();
        qt.textContent = text;
        qa.textContent = author ? '— ' + author : '';
      } catch (e) {
        qt.textContent = 'Жизнь — это то, что происходит, пока ты строишь другие планы.';
        qa.textContent = '— Джон Леннон';
      }

      qt.classList.remove('fade');
      qa.classList.remove('fade');
      btn.disabled = false;
    }

    loadQuote();
  </script>
</body>
</html>
