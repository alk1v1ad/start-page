<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Start</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300&family=Cormorant+Garamond:wght@400&family=Manrope:wght@300&family=Space+Grotesk:wght@300&family=IBM+Plex+Mono:wght@300&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  height:100vh;
  background:linear-gradient(120deg,#050505,#0d0d0d,#050505);
  background-size:200% 200%;
  animation:bgMove 20s ease infinite;
  color:#eaeaea;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  overflow:hidden;
}

@keyframes bgMove{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}

/* ФОН */
.bg{
  position:fixed;
  inset:-60%;
  pointer-events:none;
  white-space:pre-wrap;
  filter:blur(0.6px);
}

.bg span{
  display:inline-block;
  margin-right:12px;
  transition:opacity 2s ease;
}

.bg1{font-size:52px;color:rgba(255,255,255,0.06)}
.bg2{font-size:46px;color:rgba(255,255,255,0.09)}

.container{
  position:relative;
  z-index:2;
  max-width:720px;
  padding:40px;
}

/* ТЕКСТ */
.time{
  font-family:'JetBrains Mono', monospace;
  font-size:82px;
  letter-spacing:4px;
}

.time.pulse{
  transform:scale(1.02);
  text-shadow:0 0 25px rgba(255,255,255,0.2);
}

.date{
  font-family:'JetBrains Mono', monospace;
  font-size:14px;
  color:#777;
  margin-bottom:50px;
}

.quote{
  font-family:'Cormorant Garamond', serif;
  font-size:26px;
  line-height:1.6;
  min-height:80px;
}

.author{
  font-family:'Manrope', sans-serif;
  margin-top:16px;
  font-size:13px;
  color:#aaa;
  letter-spacing:1.5px;
  opacity:0;
  transition:0.4s;
}

.author.show{opacity:1}

button{
  font-family:'Manrope', sans-serif;
  margin-top:40px;
  padding:10px 24px;
  background:rgba(255,255,255,0.04);
  border:1px solid #333;
  color:#aaa;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="bg bg1" id="bg1"></div>
<div class="bg bg2" id="bg2"></div>

<div class="container">
  <div class="time" id="time"></div>
  <div class="date" id="date"></div>

  <div class="quote" id="quote"></div>
  <div class="author" id="author"></div>

  <button id="btn">новая цитата</button>
</div>

<script>
/* ВРЕМЯ */
let lastMinute=-1;
function updateTime(){
  const now=new Date();

  time.textContent=now.toLocaleTimeString("ru-RU",{hour:"2-digit",minute:"2-digit"});
  date.textContent=now.toLocaleDateString("ru-RU",{weekday:"long",day:"numeric",month:"long"});

  if(now.getSeconds()===0 && lastMinute!==now.getMinutes()){
    lastMinute=now.getMinutes();
    time.classList.add("pulse");
    setTimeout(()=>time.classList.remove("pulse"),300);
  }
}
setInterval(updateTime,1000);
updateTime();

/* ФОН */
const fonts=[
  "'JetBrains Mono'",
  "'IBM Plex Mono'",
  "'Space Grotesk'",
  "'Cormorant Garamond'"
];

const variants=[
  "раскайся",
  "РАСКАЙСЯ",
  "раскайся.",
  "раскайся..."
];

function gen(el){
  let html="";

  for(let i=0;i<900;i++){
    const f=fonts[Math.floor(Math.random()*fonts.length)];
    const word=variants[Math.floor(Math.random()*variants.length)];

    const rare = Math.random()<0.07; // редкие большие слова

    html+=`<span style="
      font-family:${f};
      transform:rotate(${Math.random()*6-3}deg);
      opacity:${0.7+Math.random()*0.3};
      font-size:${rare ? "1.4em" : "1em"};
    ">${word}</span> `;
  }

  el.innerHTML=html;
}
gen(bg1); gen(bg2);

/* PARALLAX */
let mx=0,my=0,cx=0,cy=0;

window.addEventListener("mousemove",e=>{
  mx=(e.clientX/innerWidth-0.5);
  my=(e.clientY/innerHeight-0.5);
});

function animate(){
  cx+=(mx-cx)*0.05;
  cy+=(my-cy)*0.05;

  bg1.style.transform=`translate(${cx*40}px,${cy*40}px) rotate(-25deg)`;
  bg2.style.transform=`translate(${cx*80}px,${cy*80}px) rotate(-15deg)`;

  requestAnimationFrame(animate);
}
animate();

/* TYPEWRITER */
function typeText(text,cb){
  quote.textContent="";
  let i=0;
  function step(){
    if(i<text.length){
      quote.textContent+=text[i++];
      setTimeout(step,18);
    } else cb && cb();
  }
  step();
}

/* ЦИТАТЫ */
const quotes=[
["Тот, у кого есть зачем жить, выдержит почти любое как.","Фридрих Ницше"],
["Мы страдаем больше в воображении, чем в реальности.","Сенека"],
["Ты имеешь власть над своим разумом.","Марк Аврелий"],
["Человек осуждён быть свободным.","Сартр"],
["Абсурд рождается из столкновения человека и мира.","Камю"],
["Я мыслю, следовательно, существую.","Декарт"],
["Счастье зависит от нас самих.","Аристотель"],
["Всё течёт.","Гераклит"],
["Познай себя.","Сократ"],
["Свобода — это осознанная необходимость.","Гегель"],
["Бог умер.","Ницше"],
["Жизнь — борьба.","Шопенгауэр"],
["Ад — это другие.","Сартр"],
["Смысл нужно создавать.","Камю"],
["Знание — сила.","Бэкон"],
["Характер — судьба.","Гераклит"],
["Истина рождается в споре.","Сократ"],
["Думай сам.","Кант"],
["Мужество — начало действия.","Демокрит"],
["Жизнь коротка.","Гиппократ"],
["Человек — мера всех вещей.","Протагор"],
["Терпение — сила.","Конфуций"],
["Путь начинается с шага.","Лао-цзы"],
["Молчание — учитель.","Пифагор"],
["Начни сейчас.","—"],
["Действие важнее слов.","—"],
["Ты знаешь, что делать.","—"],
["Контроль — это свобода.","—"],
["Дисциплина — выбор.","—"],
["Просто начни.","—"]
];

function getUnused(){
  const used=JSON.parse(localStorage.getItem("used")||"[]");
  return quotes.map((_,i)=>i).filter(i=>!used.includes(i));
}

function loadQuote(){
  author.classList.remove("show");

  let unused=getUnused();
  if(unused.length===0){
    localStorage.setItem("used","[]");
    unused=getUnused();
  }

  const i=unused[Math.floor(Math.random()*unused.length)];

  const used=JSON.parse(localStorage.getItem("used")||"[]");
  used.push(i);
  localStorage.setItem("used",JSON.stringify(used));

  typeText(quotes[i][0],()=>{
    author.textContent="— "+quotes[i][1];
    author.classList.add("show");
  });
}

btn.onclick=loadQuote;
loadQuote();
</script>

</body>
</html>
